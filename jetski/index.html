    <!-- Synchronously extract and apply background color from main.js config before rendering to prevent color flashes -->
    <script>
      (function() {
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', 'main.js', false);
          xhr.send(null);
          if (xhr.status === 200) {
            var matchTop = xhr.responseText.match(/backgroundColorTop\s*:\s*['"]([^'"]+)['"]/);
            var matchBottom = xhr.responseText.match(/backgroundColorBottom\s*:\s*['"]([^'"]+)['"]/);
            var matchText = xhr.responseText.match(/hoverColorText\s*:\s*['"]([^'"]+)['"]/);
            var hoverStyleText = '';
            if (matchText && matchText[1]) {
              hoverStyleText = ':root { --hover-color: ' + matchText[1] + '; }';
            }
            if (matchTop && matchBottom) {
              var grad = 'linear-gradient(to bottom, ' + matchTop[1] + ', ' + matchBottom[1] + ')';
              var style = document.createElement('style');
              style.innerHTML = '#bg { background: ' + grad + ' !important; } body { background: transparent !important; } ' + hoverStyleText;
              document.head.appendChild(style);
            } else {
              var match = xhr.responseText.match(/backgroundColor\s*:\s*['"]([^'"]+)['"]/);
              if (match && match[1]) {
                document.documentElement.style.backgroundColor = match[1];
                var style = document.createElement('style');
                style.innerHTML = 'body, #loading { background-color: ' + match[1] + ' !important; }';
                document.head.appendChild(style);
              }
            }
          }
        } catch(e) {}
      })();
    </script>
